<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강두형 | About Me</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: #0a0f1e;
        color: #e0f0ff;
        min-height: 100vh;
      }

      header {
        background: linear-gradient(
          135deg,
          #1c86c8 0%,
          #6acaef 50%,
          #1c86c8 100%
        );
        padding: 60px 20px 50px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      header::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 60%
        );
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0a2e52, #1c5fa8);
        border: 4px solid #fff;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        position: relative;
        z-index: 1;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      header h1 {
        font-size: 2.4rem;
        font-weight: 900;
        color: #fff;
        position: relative;
        z-index: 1;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      header p.subtitle {
        margin-top: 8px;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 300;
        position: relative;
        z-index: 1;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 60px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .card {
        background: #111827;
        border: 1px solid #1c86c820;
        border-radius: 16px;
        padding: 28px 32px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 32px rgba(28, 134, 200, 0.15);
      }

      .card-title {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #6acaef;
        margin-bottom: 18px;
        border-bottom: 1px solid #1c86c830;
        padding-bottom: 10px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .info-item label {
        display: block;
        font-size: 0.7rem;
        color: #6acaef;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .info-item span {
        font-size: 1rem;
        font-weight: 700;
        color: #e0f0ff;
      }

      footer {
        text-align: center;
        padding: 20px;
        font-size: 0.75rem;
        color: #334;
      }

      @media (max-width: 500px) {
        .info-grid {
          grid-template-columns: 1fr;
        }
        header h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="avatar">🙋</div>
      <h1>강두형</h1>
      <p class="subtitle">Kang Du-hyung · 2000</p>
    </header>

    <main>
      <div class="card">
        <div class="card-title">기본 정보</div>
        <div class="info-grid">
          <div class="info-item">
            <label>이름</label>
            <span>강두형</span>
          </div>
          <div class="info-item">
            <label>생년월일</label>
            <span>2000.01.14</span>
          </div>
          <div class="info-item">
            <label>나이</label>
            <span>27세</span>
          </div>
          <div class="info-item">
            <label>거주지</label>
            <span>서울</span>
          </div>
        </div>
      </div>
    </main>

    <footer>© 2026 Kang Du-hyung</footer>
  </body>
</html>
